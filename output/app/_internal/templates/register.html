{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block login_content %}
<div style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="glass-card" style="width: 400px; text-align: center;">
        <h1 style="margin-bottom: 0.5rem;">Join {{ business_settings.company_name if business_settings else 'Quantum' }}
        </h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Create a new staff account</p>

        <form method="POST">
            <div style="text-align: left; margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Full Name</label>
                <input type="text" name="full_name" required
                    style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
            </div>

            <div style="text-align: left; margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Company Name</label>
                <input type="text" name="company_name" required
                    style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
            </div>

            <div style="text-align: left; margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Username</label>
                <input type="text" name="username" required
                    style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
            </div>

            <div style="text-align: left; margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Email Address</label>
                <input type="email" name="email" required
                    style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
            </div>

            <div style="text-align: left; margin-bottom: 1.25rem; display: flex; gap: 0.75rem;">
                <div style="width: 100px;">
                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Code</label>
                    <input type="text" name="country_code" value="+91" required
                        style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Mobile Number</label>
                    <input type="text" name="mobile" required placeholder="1234567890"
                        style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                </div>
            </div>

            <div style="text-align: left; margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
                <input type="password" name="password" required
                    style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
            </div>

            <button type="submit" class="btn-premium" style="width: 100%; margin-bottom: 1.5rem;">Register</button>
            <p style="font-size: 0.85rem; color: var(--text-muted);">
                Already have an account? <a href="{{ url_for('auth.login') }}"
                    style="color: var(--accent-primary); text-decoration: none;">Sign In</a>
            </p>

        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block login_content %}
<div style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="glass-card" style="width: 400px; text-align: center;">
        <h1 style="margin-bottom: 0.5rem;">Welcome Back</h1>


        <form method="POST">
            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Username</label>
                <input type="text" name="username" required
                    style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
            </div>

            <div style="text-align: left; margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
                <input type="password" name="password" required
                    style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
            </div>

            <button type="submit" class="btn-premium" style="width: 100%; margin-bottom: 1.5rem;">Sign In</button>
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <a href="{{ url_for('auth.register') }}"
                    style="color: var(--accent-primary); text-decoration: none;">Register Now</a>
                <a href="{{ url_for('auth.forgot_password') }}"
                    style="color: var(--text-muted); text-decoration: none;">Forgot Password?</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

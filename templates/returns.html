{% extends "base.html" %}

{% block title %}Return Invoice{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1>Invoice Returns</h1>
        <div style="color: var(--text-muted); font-size: 0.9rem;">
            <i class="fas fa-info-circle mr-1"></i> Process returns to update stock and finalize refunds.
        </div>
    </div>

    <div class="glass-card" style="padding: 2.5rem;">
        <h3 style="margin-bottom: 1.5rem;">Find Invoice</h3>
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
            <div style="position: relative; flex-grow: 1;">
                <input type="text" id="returnInvNum" placeholder="Scan or Enter Invoice Number (e.g. INV-2026...)"
                    style="width: 100%; padding: 1rem 1rem 1rem 3rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; color: white;">
                <i class="fas fa-search"
                    style="position: absolute; left: 1.2rem; top: 1.2rem; color: var(--text-muted);"></i>
            </div>
            <button onclick="searchInvoice()" class="btn-premium" style="padding: 0 2rem; border-radius: 12px;">
                SEARCH
            </button>
        </div>

        <div id="invDetails"
            style="display: none; border-top: 1px solid var(--glass-border); padding-top: 2rem; animation: fadeIn 0.4s ease;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                <div class="glass-card" style="background: rgba(255,255,255,0.02); padding: 1rem;">
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">DATE & TIME</p>
                    <p id="detDate" style="font-weight: 600;"></p>
                </div>
                <div class="glass-card" style="background: rgba(255,255,255,0.02); padding: 1rem;">
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">TOTAL AMOUNT</p>
                    <p style="font-weight: 600; font-size: 1.2rem; color: var(--accent-primary);">₹<span
                            id="detAmt"></span></p>
                </div>
                <div class="glass-card" style="background: rgba(255,255,255,0.02); padding: 1rem;">
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">STATUS</p>
                    <span id="detStatusBadge"
                        style="padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700;"></span>
                </div>
                <div class="glass-card" style="background: rgba(255,255,255,0.02); padding: 1rem;">
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">INVOICE ID</p>
                    <p id="detNum" style="font-family: monospace;"></p>
                </div>
            </div>

            <button id="btnConfirmReturn" onclick="processReturn()" class="btn-premium"
                style="width: 100%; padding: 1.5rem; background: #ef4444; border: none; font-weight: 700; letter-spacing: 0.05em;">
                CONFIRM RETURN & RESTORE STOCK
            </button>
            <p id="returnedMsg"
                style="display: none; text-align: center; color: #ef4444; margin-top: 1rem; font-weight: 600;">
                <i class="fas fa-exclamation-triangle mr-2"></i> This invoice has already been returned.
            </p>
        </div>
    </div>
</div>

<script>
    let currentInvId = null;

    async function searchInvoice() {
        const num = document.getElementById('returnInvNum').value;
        if (!num) return;

        try {
            const response = await fetch(`/api/invoice/search?num=${num}`);
            if (response.ok) {
                const inv = await response.json();
                currentInvId = inv.id;

                document.getElementById('detDate').innerText = inv.date;
                document.getElementById('detAmt').innerText = inv.amount.toFixed(2);
                document.getElementById('detNum').innerText = inv.number;

                const badge = document.getElementById('detStatusBadge');
                badge.innerText = inv.status.toUpperCase();

                if (inv.status === 'returned') {
                    badge.style.background = 'rgba(239, 68, 68, 0.2)';
                    badge.style.color = '#ef4444';
                    document.getElementById('btnConfirmReturn').style.display = 'none';
                    document.getElementById('returnedMsg').style.display = 'block';
                } else {
                    badge.style.background = 'rgba(56, 189, 248, 0.2)';
                    badge.style.color = 'var(--accent-primary)';
                    document.getElementById('btnConfirmReturn').style.display = 'block';
                    document.getElementById('returnedMsg').style.display = 'none';
                }

                document.getElementById('invDetails').style.display = 'block';
            } else {
                alert('Invoice not found. Please check the number.');
            }
        } catch (err) {
            console.error(err);
        }
    }

    async function processReturn() {
        if (!confirm('This will mark the invoice as returned and add items back to inventory. Continue?')) return;

        try {
            const response = await fetch(`/api/invoice/return/${currentInvId}`, {
                method: 'POST'
            });

            if (response.ok) {
                alert('Return successful! Stock has been updated.');
                location.reload();
            } else {
                const err = await response.json();
                alert('Error processing return: ' + err.error);
            }
        } catch (err) {
            console.error(err);
        }
    }

    // Allow Enter key to trigger search
    document.getElementById('returnInvNum').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchInvoice();
    });
</script>

<style>
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}
